<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test BASE_PATH Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5>BASE_PATH Detection Test</h5>
                    </div>
                    <div class="card-body">
                        <div id="config-info"></div>
                        
                        <div class="mt-4">
                            <h6>Generated URLs:</h6>
                            <div id="url-tests"></div>
                        </div>
                        
                        <div class="mt-4">
                            <button class="btn btn-primary" onclick="testUrls()">
                                <i class="fas fa-play me-2"></i>
                                Test URL Generation
                            </button>
                            <button class="btn btn-success" onclick="testApi()">
                                <i class="fas fa-api me-2"></i>
                                Test API Call
                            </button>
                        </div>
                        
                        <div id="test-results" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    
    <script>
        function displayConfig() {
            const configDiv = document.getElementById('config-info');
            let html = '<div class="alert alert-info">';
            html += `<strong>Current Path:</strong> ${window.location.pathname}<br>`;
            html += `<strong>Detected BASE_PATH:</strong> ${window.APP_CONFIG.BASE_PATH}<br>`;
            html += `<strong>App Name:</strong> ${window.APP_CONFIG.APP.NAME}<br>`;
            html += `<strong>Version:</strong> ${window.APP_CONFIG.APP.VERSION}<br>`;
            html += `<strong>Debug Mode:</strong> ${window.APP_CONFIG.APP.DEBUG}<br>`;
            html += '</div>';
            
            configDiv.innerHTML = html;
        }
        
        function testUrls() {
            const urlDiv = document.getElementById('url-tests');
            let html = '<div class="table-responsive"><table class="table table-sm">';
            html += '<thead><tr><th>Type</th><th>Function</th><th>Result</th></tr></thead><tbody>';
            
            // Test various URL generations
            const tests = [
                { type: 'Page', func: 'buildUrl("login.html")', result: window.buildUrl('login.html') },
                { type: 'Page', func: 'buildUrl("pages/admin/dashboard.html")', result: window.buildUrl('pages/admin/dashboard.html') },
                { type: 'API', func: 'buildApiUrl("AUTH")', result: window.buildApiUrl('AUTH') },
                { type: 'API', func: 'buildApiUrl("USERS")', result: window.buildApiUrl('USERS') },
                { type: 'Asset', func: 'buildUrl("assets/css/main.css")', result: window.buildUrl('assets/css/main.css') },
                { type: 'Page', func: 'buildPageUrl("LOGIN")', result: window.buildPageUrl('LOGIN') }
            ];
            
            tests.forEach(test => {
                html += `<tr><td>${test.type}</td><td><code>${test.func}</code></td><td><code>${test.result}</code></td></tr>`;
            });
            
            html += '</tbody></table></div>';
            urlDiv.innerHTML = html;
        }
        
        async function testApi() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div class="alert alert-info">Testing API call...</div>';
            
            try {
                const apiUrl = window.buildApiUrl('AUTH');
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', 'test_super_admin@lamabejaya.coop');
                formData.append('password', 'password123');
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                let html = '<div class="alert alert-success">';
                html += `<strong>API URL:</strong> ${apiUrl}<br>`;
                html += `<strong>Status:</strong> ${response.status}<br>`;
                html += `<strong>Response:</strong> ${JSON.stringify(result, null, 2)}`;
                html += '</div>';
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${error.message}</div>`;
            }
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            displayConfig();
            testUrls();
        });
    </script>
</body>
</html>
