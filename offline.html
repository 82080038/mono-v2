<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - KSP Lam Gabe Jaya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        
        .offline-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.2);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            margin: 1rem;
        }
        
        .offline-icon {
            font-size: 4rem;
            color: #ffc107;
            margin-bottom: 1.5rem;
        }
        
        .offline-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #343a40;
            margin-bottom: 1rem;
        }
        
        .offline-message {
            color: #6c757d;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem 2rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 123, 255, 0.3);
        }
        
        .connection-status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 193, 7, 0.1);
            border-radius: 0.5rem;
            border-left: 4px solid #ffc107;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.offline {
            background-color: #dc3545;
        }
        
        .status-indicator.checking {
            background-color: #ffc107;
        }
        
        .status-indicator.online {
            background-color: #28a745;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi"></i>
        </div>
        
        <h1 class="offline-title">Anda Sedang Offline</h1>
        
        <p class="offline-message">
            Tidak ada koneksi internet. Beberapa fitur mungkin tidak tersedia. 
            Silakan periksa koneksi Anda dan coba lagi.
        </p>
        
        <button class="btn retry-btn" onclick="checkConnection()">
            <i class="fas fa-sync-alt me-2"></i>
            Coba Lagi
        </button>
        
        <div class="connection-status">
            <div class="d-flex align-items-center justify-content-center">
                <span class="status-indicator offline" id="statusIndicator"></span>
                <span id="statusText">Memeriksa koneksi...</span>
            </div>
        </div>
        
        <div class="mt-3">
            <small class="text-muted">
                <i class="fas fa-info-circle me-1"></i>
                Aplikasi akan otomatis terhubung kembali saat koneksi tersedia
            </small>
        </div>
    </div>
    
    <script>
        let checkInterval;
        
        function checkConnection() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            // Update status to checking
            statusIndicator.className = 'status-indicator checking';
            statusText.textContent = 'Memeriksa koneksi...';
            
            // Try to fetch a small file
            fetch('/manifest.json', { 
                method: 'HEAD',
                cache: 'no-cache'
            })
            .then(response => {
                if (response.ok) {
                    // Connection is back
                    statusIndicator.className = 'status-indicator online';
                    statusText.textContent = 'Koneksi tersedia!';
                    
                    // Redirect to main app after a short delay
                    setTimeout(() => {
                        window.location.href = '/main.php';
                    }, 1500);
                } else {
                    throw new Error('Network error');
                }
            })
            .catch(error => {
                // Still offline
                statusIndicator.className = 'status-indicator offline';
                statusText.textContent = 'Masih offline';
                
                // Schedule next check
                scheduleNextCheck();
            });
        }
        
        function scheduleNextCheck() {
            // Clear existing interval
            if (checkInterval) {
                clearInterval(checkInterval);
            }
            
            // Check again in 5 seconds
            checkInterval = setInterval(() => {
                checkConnection();
                clearInterval(checkInterval); // Only check once
            }, 5000);
        }
        
        // Check connection when page loads
        document.addEventListener('DOMContentLoaded', () => {
            checkConnection();
            
            // Listen for online/offline events
            window.addEventListener('online', () => {
                console.log('Browser detected online status');
                checkConnection();
            });
            
            window.addEventListener('offline', () => {
                console.log('Browser detected offline status');
                const statusIndicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                statusIndicator.className = 'status-indicator offline';
                statusText.textContent = 'Offline';
            });
        });
        
        // Auto-check every 30 seconds
        setInterval(() => {
            checkConnection();
        }, 30000);
    </script>
</body>
</html>
