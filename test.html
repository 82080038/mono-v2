<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page - KSP Lam Gabe Jaya</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .test-section h3 { margin-top: 0; color: #333; }
        .status-ok { color: green; }
        .status-error { color: red; }
        .status-warning { color: orange; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Development Test Page</h1>
    
    <div class="test-section">
        <h3>🔗 API Connection Test</h3>
        <button onclick="testAPI('members')">Test Members API</button>
        <button onclick="testAPI('savings')">Test Savings API</button>
        <button onclick="testAPI('loans')">Test Loans API</button>
        <div id="apiResult"></div>
    </div>
    
    <div class="test-section">
        <h3>🗄️ Database Test</h3>
        <button onclick="testDatabase()">Test Database Connection</button>
        <div id="dbResult"></div>
    </div>
    
    <div class="test-section">
        <h3>📁 File Upload Test</h3>
        <input type="file" id="testFile" accept="image/*">
        <button onclick="testUpload()">Test Upload</button>
        <div id="uploadResult"></div>
    </div>
    
    <div class="test-section">
        <h3>🔐 Authentication Test</h3>
        <button onclick="testAuth()">Test Authentication</button>
        <div id="authResult"></div>
    </div>

    <script>
        async function testAPI(type) {
            const result = document.getElementById('apiResult');
            result.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`../api/${type}.php?action=get_${type}_types`);
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <p class="status-ok">✅ ${type} API working!</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `<p class="status-error">❌ API Error: ${data.message}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="status-error">❌ Connection Error: ${error.message}</p>`;
            }
        }
        
        async function testDatabase() {
            const result = document.getElementById('dbResult');
            result.innerHTML = '<p>Testing database...</p>';
            
            try {
                const response = await fetch('../api/members.php?action=get_members&limit=1');
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = '<p class="status-ok">✅ Database connection working!</p>';
                } else {
                    result.innerHTML = `<p class="status-error">❌ Database Error: ${data.message}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="status-error">❌ Database Error: ${error.message}</p>`;
            }
        }
        
        async function testUpload() {
            const result = document.getElementById('uploadResult');
            const fileInput = document.getElementById('testFile');
            
            if (!fileInput.files[0]) {
                result.innerHTML = '<p class="status-warning">⚠️ Please select a file first</p>';
                return;
            }
            
            result.innerHTML = '<p>Testing upload...</p>';
            
            const formData = new FormData();
            formData.append('document', fileInput.files[0]);
            
            try {
                const response = await fetch('../api/members.php?action=upload_document', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = '<p class="status-ok">✅ Upload working!</p>';
                } else {
                    result.innerHTML = `<p class="status-error">❌ Upload Error: ${data.message}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="status-error">❌ Upload Error: ${error.message}</p>`;
            }
        }
        
        async function testAuth() {
            const result = document.getElementById('authResult');
            result.innerHTML = '<p>Testing authentication...</p>';
            
            try {
                // Test login endpoint
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'login',
                        username: 'test',
                        password: 'test'
                    })
                });
                
                const data = await response.json();
                
                result.innerHTML = `
                    <p>Authentication endpoint reachable</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p class="status-error">❌ Auth Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
