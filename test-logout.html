<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Logout Function</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Test Logout Function</h5>
                    </div>
                    <div class="card-body">
                        <p>Halaman ini untuk testing fungsi logout.</p>
                        
                        <div class="mb-3">
                            <button class="btn btn-primary" onclick="testLogout()">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                Test Logout
                            </button>
                        </div>
                        
                        <div class="mb-3">
                            <button class="btn btn-success" onclick="setMockSession()">
                                <i class="fas fa-user-plus me-2"></i>
                                Set Mock Session
                            </button>
                        </div>
                        
                        <div class="mb-3">
                            <button class="btn btn-info" onclick="checkSession()">
                                <i class="fas fa-search me-2"></i>
                                Check Session
                            </button>
                        </div>
                        
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
    <!-- Configuration -->
    <script src="assets/js/config.js"></script>
    <!-- Authentication -->
    <script src="assets/js/auth.js"></script>
    
    <script>
        function testLogout() {
            console.log('Testing logout function...');
            document.getElementById('result').innerHTML = '<div class="alert alert-info">Testing logout...</div>';
            
            try {
                // Call logout function
                if (typeof logout === 'function') {
                    logout();
                } else if (window.authFunctions && typeof window.authFunctions.logout === 'function') {
                    window.authFunctions.logout();
                } else {
                    throw new Error('Logout function not found');
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }
        
        function setMockSession() {
            localStorage.setItem('authToken', 'mock-token-123');
            localStorage.setItem('userData', JSON.stringify({
                id: 1,
                name: 'Test User',
                email: 'test@example.com',
                role: 'admin'
            }));
            
            document.getElementById('result').innerHTML = '<div class="alert alert-success">Mock session set!</div>';
        }
        
        function checkSession() {
            const token = localStorage.getItem('authToken');
            const userData = localStorage.getItem('userData');
            
            let result = '<div class="alert alert-info">';
            result += `<strong>Token:</strong> ${token ? 'Found' : 'Not found'}<br>`;
            result += `<strong>User Data:</strong> ${userData ? 'Found' : 'Not found'}<br>`;
            result += `<strong>Logout Function:</strong> ${typeof logout === 'function' ? 'Available' : 'Not available'}<br>`;
            result += `<strong>Auth Functions:</strong> ${window.authFunctions ? 'Available' : 'Not available'}`;
            result += '</div>';
            
            document.getElementById('result').innerHTML = result;
        }
        
        // Check on load
        document.addEventListener('DOMContentLoaded', function() {
            checkSession();
        });
    </script>
</body>
</html>
