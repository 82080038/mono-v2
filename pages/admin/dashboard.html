<!DOCTYPE html><html><head><title>Dashboard Admin</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><link href="../../assets/css/dashboard-layout.css" rel="stylesheet"><link href="../../assets/css/dashboard.css" rel="stylesheet"></head><body class="bg-light"><header class="navbar navbar-dark bg-primary"><div class="container-fluid"><a class="navbar-brand" href="../../index.html"><i class="fas fa-building me-2"></i>KSP Lam Gabe Jaya</a><div class="dropdown"><button class="btn btn-link text-white dropdown-toggle" data-bs-toggle="dropdown"><i class="fas fa-user me-1"></i><span id="headerUserName">Admin</span></button><ul class="dropdown-menu"><li><a class="dropdown-item" href="#" onclick="logout()">Keluar</a></li></ul></div></div></header><div class="d-flex"><nav class="bg-dark text-white" style="width: 250px; min-height: 100vh;"><div class="p-3"><h6 class="text-white">Menu</h6><ul class="nav flex-column"><li class="nav-item"><a class="nav-link text-white active" href="#"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li><li class="nav-item"><a class="nav-link text-white" href="#"><i class="fas fa-users me-2"></i>Anggota</a></li><li class="nav-item"><a class="nav-link text-white" href="#"><i class="fas fa-hand-holding-usd me-2"></i>Pinjaman</a></li><li class="nav-item"><a class="nav-link text-white" href="#"><i class="fas fa-piggy-bank me-2"></i>Simpanan</a></li></ul></div></nav><main class="flex-grow-1 p-4"><h1>Dashboard</h1><div class="row mb-4"><div class="col-md-3"><div class="card bg-primary text-white"><div class="card-body"><h4>150</h4><p>Total Anggota</p></div></div></div><div class="col-md-3"><div class="card bg-success text-white"><div class="card-body"><h4>45</h4><p>Pinjaman Aktif</p></div></div></div><div class="col-md-3"><div class="card bg-info text-white"><div class="card-body"><h4>Rp 250Jt</h4><p>Total Simpanan</p></div></div></div><div class="col-md-3"><div class="card bg-warning text-white"><div class="card-body"><h4>12</h4><p>Pending Tasks</p></div></div></div></div><div class="row"><div class="col-md-8"><div class="card"><div class="card-body"><canvas id="mainChart"></canvas></div></div></div><div class="col-md-4"><div class="card"><div class="card-body"><h5>Aktivitas Terbaru</h5><p>New member registration - 3 mins ago</p><p>Loan approved - 1 hour ago</p><p>Payment received - 2 hours ago</p></div></div></div></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="../../assets/js/config.js"></script><script src="../../assets/js/auth-fixed.js"></script><script>function logout(){if(confirm("Apakah Anda yakin ingin keluar?")){localStorage.removeItem("authToken");localStorage.removeItem("userData");sessionStorage.removeItem("authToken");sessionStorage.removeItem("userData");window.location.href="../../login.html";}}document.addEventListener("DOMContentLoaded",function(){console.log("Dashboard loaded");const userData=JSON.parse(localStorage.getItem("userData")||sessionStorage.getItem("userData")||"{}");const displayName=userData.name||userData.username||"Admin";const userNameElement=document.getElementById("headerUserName");if(userNameElement){userNameElement.textContent=displayName;}const ctx=document.getElementById("mainChart");if(ctx){new Chart(ctx,{type:"line",data:{labels:["Jan","Feb","Mar","Apr","May","Jun"],datasets:[{label:"Pinjaman",data:[65,59,80,81,56,55],borderColor:"rgb(255, 99, 132)",tension:0.1},{label:"Simpanan",data:[28,48,40,19,86,27],borderColor:"rgb(54, 162, 235)",tension:0.1}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}});}});</script></body></html>
